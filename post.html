<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Artigo · Ygor Soares</title>
<meta name="robots" content="noindex">
<!-- Página antiga de artigo: redireciona para artigo.html preservando o slug,
     para que links já compartilhados (post.html?post=...) continuem funcionando. -->
<script>
  (function () {
    var params = new URLSearchParams(location.search);
    var slug = params.get('post') || '';
    location.replace('artigo.html' + (slug ? '?post=' + encodeURIComponent(slug) : ''));
  })();
</script>
</head>
<body>
<p>Redirecionando… <a id="destino" href="artigo.html">Abrir o artigo</a></p>
<script>
  document.getElementById('destino').href =
    'artigo.html' + (location.search || '');
</script>
</body>
</html>
