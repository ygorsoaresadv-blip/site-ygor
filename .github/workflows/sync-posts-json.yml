name: Atualizar índice do blog

on:
  push:
    branches: [main]
    paths:
      - "posts/**.md"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Gerar posts/posts.json a partir dos arquivos .md
        run: node scripts/sync-posts-json.mjs

      - name: Publicar posts.json atualizado
        run: |
          if git diff --quiet -- posts/posts.json; then
            echo "Nada para atualizar."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts/posts.json
          git commit -m "chore: atualizar indice do blog"
          git push
